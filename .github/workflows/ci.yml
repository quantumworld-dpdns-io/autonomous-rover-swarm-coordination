name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - name: Install dependencies
        run: uv pip install --system ".[dev]"
      - name: Ruff lint
        run: ruff check src/ tests/
      - name: Black check
        run: black --check src/ tests/
      - name: MyPy typecheck
        run: mypy src/

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - name: Install dependencies
        run: uv pip install --system ".[dev]"
      - name: Run unit tests
        run: pytest tests/unit/ tests/integration/ -v --cov=src/rover_swarm --cov-report=xml --cov-report=term-missing
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  robot-tests:
    runs-on: ubuntu-latest
    services:
      mosquitto:
        image: eclipse-mosquitto:2
        ports:
          - 1883:1883
          - 9001:9001
      chroma:
        image: chromadb/chroma:latest
        ports:
          - 8000:8000
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - name: Install dependencies
        run: uv pip install --system ".[dev,robot]"
      - name: Run Robot Framework tests
        run: |
          mkdir -p reports/robot
          robot --outputdir reports/robot \
            --variable BROKER_HOST:localhost \
            tests/robot/
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: robot-reports
          path: reports/robot/
          retention-days: 14

  security-sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - name: Install dependencies
        run: uv pip install --system ".[dev,security]"
      - name: Bandit SAST
        run: |
          mkdir -p reports
          bandit -r src/ -f json -o reports/bandit.json || true
      - name: Semgrep SAST
        run: |
          semgrep --config=auto --error --output=reports/semgrep.sarif --sarif src/ || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-reports
          path: reports/
          retention-days: 30

  security-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - name: Install dependencies
        run: uv pip install --system ".[dev,security]"
      - name: Safety check
        run: |
          mkdir -p reports
          safety check --json > reports/safety.json 2>/dev/null || true
      - name: pip-audit
        run: |
          pip-audit --desc on --ignore-vuln PYSEC-XXXX 2>&1 | tee reports/pip-audit.txt || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dep-reports
          path: reports/
          retention-days: 30

  coverage:
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: coverage-report
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  container-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t rover-swarm:test .
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rover-swarm:test
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-results.sarif
          retention-days: 30

  docker-build:
    if: github.ref == 'refs/heads/main'
    needs: [lint, unit-tests, robot-tests, security-sast, security-deps, container-scan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
