name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

env:
  PYTHON_VERSION: "3.12"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - name: Install build dependencies
        run: uv pip install --system build setuptools wheel twine
      - name: Build Python wheels
        run: |
          mkdir -p dist
          python -m build --wheel --sdist
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - name: Build and push Docker images
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: actions/upload-artifact@v7
        with:
          name: python-packages
          path: dist/
          retention-days: 30
      - name: Upload Docker provenance attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  sbom:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Generate CycloneDX SBOM
        uses: cdrx/cyclonedx-bom-generator-py@v1
        with:
          output: sbom.xml
          format: xml
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ./
          format: spdx-json
          output-file: sbom.spdx.json
      - name: Upload SBOM as release artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: |
            sbom.xml
            sbom.spdx.json
          retention-days: 90
      - name: Attest SBOM
        uses: actions/attest-sbom@v4
        with:
          subject-path: sbom.xml
          sbom-path: sbom.xml

  sign:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - name: Sign Docker images
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
      - name: Sign SBOM
        run: |
          cosign sign-blob --yes --bundle sbom.sig sbom.xml || true
      - uses: actions/upload-artifact@v7
        with:
          name: signatures
          path: |
            sbom.sig
            *.bundle
          retention-days: 90

  release:
    needs: [build, sbom, sign]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: python-packages
          path: dist/
      - uses: actions/download-artifact@v8
        with:
          name: sbom
          path: sbom/
      - uses: actions/download-artifact@v8
        with:
          name: signatures
          path: sigs/
      - name: Generate release notes
        id: release_notes
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -n 2 | tail -n 1 || echo "")
          if [ -n "$PREV_TAG" ]; then
            git log $PREV_TAG..${{ github.ref_name }} --oneline --no-decorate > release_notes.md
          else
            echo "Initial release" > release_notes.md
          fi
          echo "notes_file=release_notes.md" >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: ${{ steps.release_notes.outputs.notes_file }}
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          draft: false
          files: |
            dist/*.whl
            dist/*.tar.gz
            sbom/*
            sigs/*

  deploy:
    needs: [release]
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.rover-swarm.example.com
    steps:
      - uses: actions/checkout@v6
      - name: Install kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: latest
      - name: Set up Kubernetes config
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
      - name: Deploy to staging
        run: |
          kubectl set image deployment/rover-swarm \
            rover-swarm=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }} \
            --record
          kubectl rollout status deployment/rover-swarm --timeout=5m
      - name: Smoke test staging deployment
        run: |
          curl -sf --retry 10 --retry-delay 5 \
            https://staging.rover-swarm.example.com/health || exit 1
      - name: Deploy to production
        if: ${{ !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-beta') && !contains(github.ref_name, '-alpha') }}
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-prod.yml',
              ref: 'main',
              inputs: {
                version: '${{ github.ref_name }}'
              }
            });
