# OWASP ZAP Full Scan Configuration
# Used for automated security scanning of the rover-swarm web API

# Scan Policies
# Exclude low-risk alert types to reduce noise
10038	IGNORE	# Content Security Policy (CSP) Header Not Set
10096	IGNORE	# Timestamp Disclosure - not a security issue
10027	IGNORE	# Information Disclosure - Suspicious Comments
10054	IGNORE	# Cookie without SameSite Attribute
10049	IGNORE	# Non-Storable Content (Cache control for API responses)
2		IGNORE	# Private IP Disclosure (expected in internal env)
10023	IGNORE	# Information Disclosure - Debug Error Messages

# Authentication
# Form-based auth for the web API
# formbased_login_url=http://localhost:8080/auth/login
# formbased_login_request_data=username={%username%}&password={%password%}
# formbased_login_indicator_regex_pattern=\\Q"token"\\E

# Context definition
# context1.name=rover-swarm
# context1.include_in_context=.*
# context1.in_scope_only=true

# Active Scan Configuration
# Alert threshold and attack strength
alert_threshold=MEDIUM
attack_strength=DEFAULT

# URLs to exclude from scanning
# - Logout endpoints (can break sessions)
# - Static assets (no value in scanning)
exclude_urls:
  /logout
  /static/.*
  /favicon.ico
  /robots.txt

# Passive scan configuration
passive_scanner_max_alerts=1000

# API Configuration
api_key=changeme
# Enable API for CI integration
api.disablekey=true

# Connection
connection_timeout_secs=120
default_user_agent=Mozilla/5.0 (compatible; OWASP-ZAP/CI; rover-swarm-security-scan)

# Report configuration
reports:
  - format: html
    title: "OWASP ZAP Security Scan Report"
    template: traditional
    display: true
  - format: markdown
    title: "OWASP ZAP Security Scan Summary"
    template: traditional
    display: false
  - format: json
    title: "OWASP ZAP Security Scan Data"
    template: traditional
    display: false
